serving:
  max_batch_size: 8
  max_batch_tokens: 128
  prefill_chunk_tokens: 64
  max_kv_tokens: 32768
  speculative:
    family: mtp
    max_additional_tokens: 4
    acceptance:
      kind: conditional_empirical
      match_probability_by_position: [0.82, 0.71, 0.60, 0.50]
      seed: 42
  requests:
    - id: interactive-0
      arrival_ns: 0
      prompt_tokens: 512
      output_tokens: 64
      priority: 1
    - id: batch-0
      arrival_ns: 250000
      prompt_tokens: 2048
      output_tokens: 128
    - id: interactive-1
      arrival_ns: 500000
      prompt_tokens: 256
      output_tokens: 48
      priority: 1
    - id: batch-1
      arrival_ns: 750000
      prompt_tokens: 1024
      output_tokens: 96
